<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSE 中文分數計算機 - 完整數據版</title>
    <style>
        body { font-family: -apple-system, "微軟正黑體", sans-serif; background-color: #f4f7f9; padding: 20px; color: #333; line-height: 1.5; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        h3 { margin-top: 0; }
        .paper-section { background: #fff; padding: 20px; margin-bottom: 20px; border: 1px solid #e1e4e8; border-left: 6px solid #3498db; border-radius: 4px; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        
        .option-toggle { background: #eef2f7; padding: 15px; border-radius: 8px; margin: 20px 0; display: flex; align-items: center; gap: 10px; border: 1px solid #d1d9e6; }
        .compare-box { background: #fff3cd; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px solid #ffeeba; }
        .hidden { display: none; }

        .calc-btn { width: 100%; padding: 18px; background: #3498db; color: white; border: none; border-radius: 8px; font-size: 1.2em; cursor: pointer; font-weight: bold; margin: 10px 0; }
        .calc-btn:hover { background: #2980b9; }

        .result-area { padding: 25px; border: 2px solid #3498db; border-radius: 10px; background: #f0f7ff; margin-bottom: 40px; }
        .grade-display { font-size: 3.5em; color: #e74c3c; font-weight: bold; margin: 10px 0; }
        .formula-box { background: white; padding: 15px; border-radius: 5px; font-family: monospace; white-space: pre-wrap; border: 1px solid #d6eaf8; font-size: 0.95em; }

        /* 表格樣式 */
        .table-title { background: #34495e; color: white; padding: 10px; margin: 30px 0 0 0; border-radius: 5px 5px 0 0; font-size: 1.1em; }
        .scroll-wrapper { overflow-x: auto; margin-bottom: 30px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; min-width: 650px; background: white; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; font-size: 0.9em; }
        th { background: #f8f9fa; color: #333; }
        tr:nth-child(even) { background: #fafafa; }
    </style>
</head>
<body>

<div class="container">
    <h1>DSE 中文分數計算機</h1>

    <div class="paper-section">
        <h3>卷一：閱讀 (佔 40%)</h3>
        <div class="input-group">
            <div><label>甲部得分 / 總分</label><div style="display:flex;gap:5px;align-items:center;"><input type="number" id="p1as" placeholder="分"> / <input type="number" id="p1af" value="21"></div></div>
            <div><label>乙部得分 / 總分</label><div style="display:flex;gap:5px;align-items:center;"><input type="number" id="p1bs" placeholder="分"> / <input type="number" id="p1bf" value="67"></div></div>
        </div>
    </div>

    <div class="paper-section" style="border-left-color: #e67e22;">
        <h3>卷二：寫作 (佔 45%)</h3>
        <div class="input-group">
            <div><label>甲部得分 (滿分 50)</label><input type="number" id="p2as" placeholder="輸入分數"></div>
            <div><label>乙部得分 (滿分 100)</label><input type="number" id="p2bs" placeholder="輸入分數"></div>
        </div>
    </div>

    <div class="option-toggle">
        <input type="checkbox" id="enableCompare" style="width: 18px; height: 18px; cursor: pointer;" onchange="toggleUI()">
        <label for="enableCompare" style="margin:0; cursor: pointer;">開啟「年度等級比對」預測功能</label>
    </div>

    <div id="compareUI" class="compare-box hidden">
        <label>🎯 選擇比對年份：</label>
        <select id="targetYear">
            <option value="2025">2025 年</option>
            <option value="2024">2024 年</option>
            <option value="2023">2023 年</option>
            <option value="2022">2022 年</option>
            <option value="2021">2021 年</option>
            <option value="2020">2020 年</option>
            <option value="2019">2019 年</option>
        </select>
    </div>

    <button class="calc-btn" onclick="runCalc()">立即計算詳細結果</button>

    <div id="resultOutput" class="result-area" style="display:none;">
        <h2 style="margin-top:0; text-align: center; color: #2c3e50;">計算報告</h2>
        <div id="mainScore" style="text-align:center; font-size:1.6em; margin-bottom:15px;"></div>
        
        <div id="gradeBox" style="text-align:center; display:none; border-bottom: 2px dashed #3498db; padding-bottom: 20px; margin-bottom: 20px;">
            <div style="font-size: 1.1em; color: #555;">根據 <span id="resYear"></span> 年數據，您的預計等級：</div>
            <div class="grade-display" id="resGrade">-</div>
        </div>

        <div id="steps" class="formula-box"></div>
    </div>

    <hr style="margin: 40px 0;">

    <h2>歷年 Cut-off 參考數據 (%)</h2>

    <div class="table-title">表 (一)：DSE 中文 Overall (全卷總計)</div>
    <div class="scroll-wrapper">
        <table>
            <thead><tr><th>等級</th><th>2025</th><th>2024</th><th>2023</th><th>2022</th><th>2021</th><th>2020</th><th>2019</th></tr></thead>
            <tbody id="tableOverall"></tbody>
        </table>
    </div>

    <div class="table-title" style="background:#2980b9;">表 (二)：DSE 中文卷一 (閱讀)</div>
    <div class="scroll-wrapper">
        <table>
            <thead><tr><th>等級</th><th>2025</th><th>2024</th><th>2023</th><th>2022</th><th>2021</th><th>2020</th><th>2019</th></tr></thead>
            <tbody id="tableP1"></tbody>
        </table>
    </div>

    <div class="table-title" style="background:#d35400;">表 (三)：DSE 中文卷二 (寫作)</div>
    <div class="scroll-wrapper">
        <table>
            <thead><tr><th>等級</th><th>2025</th><th>2024</th><th>2023</th><th>2022</th><th>2021</th><th>2020</th><th>2019</th></tr></thead>
            <tbody id="tableP2"></tbody>
        </table>
    </div>
</div>

<script>
// 數據庫
const dataOverall = [
    ["5**", 71, 70, 71, 71, 72, 72, 73], ["5*", 66, 68, 66, 66, 68, 68, 67], ["5", 62, 62, 63, 63, 65, 65, 63],
    ["4", 56, 57, 57, 56, 58, 59, 58], ["3", 50, 49, 52, 51, 53, 53, 53], ["2", 42, 40, 44, 40, 47, 47, 59]
];
const dataP1 = [
    ["5**", 72, 68, 65, 68, 68, 66, 67], ["5*", 67, 65, 63, 61, 64, 64, 63], ["5", 64, 55, 56, 59, 60, 59, 59],
    ["4", 58, 50, 51, 51, 55, 52, 52], ["3", 51, 46, 44, 40, 48, 44, 46], ["2", 44, 40, 36, 38, 43, 37, 38]
];
const dataP2 = [
    ["5**", 73, 68, 66, 68, 68, 67, 69], ["5*", 65, 65, 61, 63, 67, 65, 66], ["5", 62, 55, 57, 58, 62, 62, 62],
    ["4", 54, 50, 54, 54, 56, 55, 58], ["3", 51, 46, 50, 48, 50, 52, 55], ["2", 45, 45, 45, 42, 43, 45, 44]
];

function fillTable(id, data) {
    const el = document.getElementById(id);
    data.forEach(row => {
        el.innerHTML += `<tr><td>${row[0]}</td>${row.slice(1).map(v => `<td>(${v})</td>`).join('')}</tr>`;
    });
}

function toggleUI() {
    document.getElementById('compareUI').classList.toggle('hidden', !document.getElementById('enableCompare').checked);
}

function runCalc() {
    const p1as = parseFloat(document.getElementById('p1as').value) || 0;
    const p1af = parseFloat(document.getElementById('p1af').value) || 1;
    const p1bs = parseFloat(document.getElementById('p1bs').value) || 0;
    const p1bf = parseFloat(document.getElementById('p1bf').value) || 1;
    const p2as = parseFloat(document.getElementById('p2as').value) || 0;
    const p2bs = parseFloat(document.getElementById('p2bs').value) || 0;

    let p1_pct = ((p1as/p1af * 0.3) + (p1bs/p1bf * 0.7)) * 100;
    let p1_wt = p1_pct * 0.4;
    let p2_pct = ((p2as/50 * 0.3) + (p2bs/100 * 0.7)) * 100;
    let p2_wt = p2_pct * 0.45;
    let total = p1_wt + p2_wt;

    document.getElementById('resultOutput').style.display = 'block';
    document.getElementById('mainScore').innerHTML = `全卷預估總分：<span style="color:#e67e22; font-weight:bold;">${total.toFixed(2)}%</span>`;

    const isCompare = document.getElementById('enableCompare').checked;
    if (isCompare) {
        const year = document.getElementById('targetYear').value;
        const yearIdx = 2025 - parseInt(year) + 1;
        let grade = "U / 1";
        for (let row of dataOverall) { if (total >= row[yearIdx]) { grade = row[0]; break; } }
        document.getElementById('gradeBox').style.display = 'block';
        document.getElementById('resYear').innerText = year;
        document.getElementById('resGrade').innerText = grade;
    } else {
        document.getElementById('gradeBox').style.display = 'none';
    }

    document.getElementById('steps').innerText = `【計算詳細經過】\n1. 卷一 (40%)：得分率 ${p1_pct.toFixed(1)}% | 貢獻分 ${p1_wt.toFixed(2)}%\n2. 卷二 (45%)：得分率 ${p2_pct.toFixed(1)}% | 貢獻分 ${p2_wt.toFixed(2)}%\n3. 合計總分：${total.toFixed(2)}% / 85%`;
    window.scrollTo({ top: document.getElementById('resultOutput').offsetTop - 20, behavior: 'smooth' });
}

window.onload = () => {
    fillTable('tableOverall', dataOverall);
    fillTable('tableP1', dataP1);
    fillTable('tableP2', dataP2);
};
</script>
</body>
</html>
